# Optional override for deployments that use caddy-docker-proxy for edge TLS
# + IP allow-list. Requires an external Docker network named "caddy" created by
# a running caddy-docker-proxy instance.
#
#   docker compose -f compose.yml -f compose.caddy.yml up -d --build
#
# or set COMPOSE_FILE=compose.yml:compose.caddy.yml in your .env.
#
# Set ACONTROL_DOMAIN and ACONTROL_ALLOW_IPS in .env. To disable the IP
# allow-list, remove the @denied / abort labels below.
services:
  frontend:
    # caddy proxies via the internal network — no host port needed, so drop
    # the base compose's published port (avoids a host port conflict).
    ports: !reset []
    networks:
      - internal
      - caddy
    labels:
      caddy: ${ACONTROL_DOMAIN}
      # Deny everyone NOT in ACONTROL_ALLOW_IPS. Left empty → default matches
      # all IPs, so "not in all" denies no one = open to everyone.
      caddy.@denied.not.remote_ip: ${ACONTROL_ALLOW_IPS:-0.0.0.0/0 ::/0}
      caddy.abort: "@denied"
      caddy.reverse_proxy: "{{upstreams 80}}"

networks:
  caddy:
    external: true
    # Name of the existing network your caddy-docker-proxy watches.
    # Override in .env if it isn't literally "caddy" (e.g. ACONTROL_CADDY_NETWORK=web).
    name: ${ACONTROL_CADDY_NETWORK:-caddy}
