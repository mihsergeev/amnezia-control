# ротация docker-логов: без max-size json-file-логи растут без предела и панель
# может забить собственный диск (коллектор/expiry/бэкап пишут каждый цикл)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: acontrol
      POSTGRES_USER: acontrol
      POSTGRES_PASSWORD: ${ACONTROL_DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acontrol -d acontrol"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      VPNPANEL_DB_URL: postgresql+asyncpg://acontrol:${ACONTROL_DB_PASSWORD}@db:5432/acontrol
      VPNPANEL_JWT_SECRET: ${ACONTROL_JWT_SECRET}
      VPNPANEL_ADMIN_USER: ${ACONTROL_ADMIN_USER}
      VPNPANEL_ADMIN_PASSWORD: ${ACONTROL_ADMIN_PASSWORD}
      # break-glass: 1 сбрасывает пароль/2FA админа при старте (потом убрать)
      VPNPANEL_ADMIN_PASSWORD_RESET: ${ACONTROL_ADMIN_PASSWORD_RESET:-0}
      VPNPANEL_DATA_DIR: /data
      VPNPANEL_PANEL_IP: ${ACONTROL_PANEL_IP}
      VPNPANEL_DEFAULT_SSH_USER: ${ACONTROL_DEFAULT_SSH_USER:-acontrol}
      VPNPANEL_STATS_INTERVAL: ${ACONTROL_STATS_INTERVAL:-300}
      VPNPANEL_EXPIRY_INTERVAL: ${ACONTROL_EXPIRY_INTERVAL:-300}
      VPNPANEL_DISK_ALERT_PERCENT: ${ACONTROL_DISK_ALERT_PERCENT:-90}
      VPNPANEL_BACKUP_INTERVAL_HOURS: ${ACONTROL_BACKUP_INTERVAL_HOURS:-24}
      VPNPANEL_BACKUP_KEEP: ${ACONTROL_BACKUP_KEEP:-14}
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      # /api/health теперь проверяет и БД → 503 при мёртвом Postgres, healthcheck
      # переведёт контейнер в unhealthy (restart:unless-stopped перезапустит)
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    # Panel is served on the host at ACONTROL_BIND (default 127.0.0.1:8080).
    # Put a reverse proxy with HTTPS in front, or use compose.caddy.yml.
    ports:
      - "${ACONTROL_BIND:-127.0.0.1:8080}:80"
    networks:
      - internal

networks:
  internal:
