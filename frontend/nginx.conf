server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # не раскрываем версию nginx
    server_tokens off;

    # Аутентификация — внутренняя (JWT + 2FA) в самой панели; сетевой доступ
    # ограничивается IP-whitelist'ом на реверс-прокси (Caddy). Отдельный
    # HTTP basic auth убран, чтобы не было двойного входа.

    # запрет индексации поисковиками
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # Заголовки безопасности. CSP проверена на реальной сборке (SPA монтируется,
    # 0 нарушений): script только со своего origin (нет inline-скриптов),
    # data: — для QR-картинок, unsafe-inline в style — для инлайновых стилей React.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    # HSTS: игнорируется по HTTP (standalone), применяется когда впереди HTTPS-прокси
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
