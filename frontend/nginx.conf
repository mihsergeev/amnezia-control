server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Аутентификация — внутренняя (JWT + 2FA) в самой панели; сетевой доступ
    # ограничивается IP-whitelist'ом на реверс-прокси (Caddy). Отдельный
    # HTTP basic auth убран, чтобы не было двойного входа.

    # запрет индексации поисковиками
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
